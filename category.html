<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Result Premium - Category</title>
    <meta name="description" content="Get Latest Government Jobs, Admit Cards, Results, Answer Keys, and Admission updates with a premium experience.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('sarkari-theme') || 'light-theme';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body class="light-theme">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('sarkari-theme') || 'light-theme';
            document.body.className = savedTheme;
        })();
    </script>

    <header class="glass-nav">
        <div class="container nav-content">
            <div class="logo">
                <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center;">
                    <i class="ph-bold ph-graduation-cap" style="margin-right:0.5rem;"></i>
                    <span>Sarkari<span class="highlight">Result</span></span>
                </a>
            </div>
            <nav class="desktop-nav">
                <a href="index.html#home">Home</a>
                <a href="index.html#latest-jobs">Latest Jobs</a>
                <a href="index.html#admit-card">Admit Card</a>
                <a href="index.html#result">Result</a>
            </nav>
            <div class="nav-actions">
                <div class="search-box hide-mobile">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Search jobs, results...">
                </div>
                <button id="theme-toggle" class="icon-btn">
                    <i class="ph ph-moon"></i>
                </button>
                <button id="mobile-menu-btn" class="icon-btn mobile-only">
                    <i class="ph ph-list"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container page-content" style="margin-top: 120px;">
        <div class="detail-grid" style="grid-template-columns: 1fr;">
            <div class="detail-main">
                <section class="info-card glass" style="margin-bottom: 2rem; background: linear-gradient(135deg, rgba(99, 103, 255, 0.1), rgba(167, 139, 250, 0.1)); border: 1px solid rgba(99, 103, 255, 0.2); padding: 2rem; border-radius: 16px;">
                    <h1 id="category-page-title" style="color: var(--primary); font-size: 2.2rem; margin-bottom: 1rem;"><i class="ph-bold ph-list-dashes"></i> Category</h1>
                    <div class="post-meta" style="opacity: 0.8; display: flex; gap: 2rem; font-weight: 500;">
                        <span><i class="ph ph-clock"></i> Regularly Updated</span>
                        <span><i class="ph ph-tag"></i> Real-time</span>
                    </div>
                </section>

                <div class="content-card glass" style="padding: 2rem; border-radius: 16px; margin: 0;">
                    <ul class="link-list" id="category-list">
                        <!-- Unlimited Links injected here -->
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <footer class="glass-footer" style="margin-top: 4rem;">
        <div class="container footer-content">
            <div class="footer-links" style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap; width:100%;">
                <a href="links/about-us.html">About Us</a>
                <a href="links/contact-us.html">Contact Us</a>
                <a href="links/privacy-policy.html">Privacy Policy</a>
                <a href="links/disclaimer.html">Disclaimer</a>
                <a href="links/faq.html">FAQ</a>
            </div>
        </div>
        <div class="container" style="text-align:center; padding-top:2rem; border-top:1px solid var(--glass-border); margin-top:2rem;">
            <p style="opacity:0.7; font-size:0.9rem;">&copy; 2026 Sarkari Result Premium. All rights reserved.</p>
        </div>
    </footer>

    <!-- Social Float -->
    <div class="social-float">
        <a href="https://whatsapp.com/channel/" target="_blank" class="social-btn whatsapp"><i class="ph-fill ph-whatsapp-logo"></i></a>
        <a href="https://t.me/" target="_blank" class="social-btn telegram"><i class="ph-fill ph-telegram-logo"></i></a>
    </div>

    <!-- Need to load data first, if data is inside script.js it's fine -->
    <script src="script.js"></script>
</body>
</html>
